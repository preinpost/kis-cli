name: kis-daytrade

# 로컬 빌드 + 데이트레이드 자동매매 데몬 (단독 실행).
# GHCR 발행 이미지로 띄우려면 deploy/ 참조.
# 상태(symbols.db·토큰캐시·*.toml)는 external 볼륨 kis-data 공유 — 준비 절차는 telegram.yaml 헤더 참조.
#
#   전략 등록: docker compose -f daytrade.yaml run --rm daytrade daytrade add paper ma-cross 005930 --qty 1 --budget 1000000
#   기동:     docker compose -f daytrade.yaml up -d      # daytrade.toml 변경 hot-reload

services:
  daytrade:
    build:
      context: .
      dockerfile: Dockerfile
    image: kis-cli:latest
    command: ["daytrade", "daemon"]
    env_file:                      # 둘 다 선택 — .env.local 이 .env 를 덮어씀
      - path: .env
        required: false
      - path: .env.local
        required: false
    environment:
      TZ: Asia/Seoul               # 한국 장시간 기준
      RUST_LOG: ${RUST_LOG:-info}
    volumes:
      - kis-data:/data             # 토큰캐시·symbols.db·*.toml 영속 (세 데몬 공유)
    init: true                     # tini → SIGTERM 전달 (그레이스풀 종료)
    stop_grace_period: 30s         # run 모드 포지션 평탄화 여유
    restart: unless-stopped

volumes:
  kis-data:
    external: true                 # 데몬 간 공유 — `docker volume create kis-data` 로 최초 1회 생성
