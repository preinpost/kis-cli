name: kis-stop-loss

# 로컬 빌드 + 자동 손절 데몬 (전용 바이너리 kisd-stop-loss).
# ⚠ command 끝에 "--execute" 를 붙이면 실주문. 기본은 dry-run(관찰만) — 검증 후 붙일 것.
# GHCR 발행 이미지로 띄우려면 deploy/ 참조. 상태는 external 볼륨 kis-data 공유 — brief.yaml 헤더 참조.
#
#   기동(dry-run): docker compose -f stop-loss.yaml up -d

services:
  stop-loss:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PKG: kisd-stop-loss
        BIN: kisd-stop-loss
    image: kisd-stop-loss:local
    # 데몬 바이너리라 플래그만. 실매도하려면 끝에 "--execute" 추가.
    command: ["--threshold", "-5"]
    env_file:                      # 둘 다 선택 — .env.local 이 .env 를 덮어씀
      - path: .env
        required: false
      - path: .env.local
        required: false
    environment:
      TZ: Asia/Seoul               # 한국 장시간 기준
      RUST_LOG: ${RUST_LOG:-info}
    volumes:
      - kis-data:/data             # 토큰캐시·symbols.db·*.toml 영속 (세 데몬 공유)
    init: true                     # tini → SIGTERM 전달 (그레이스풀 종료)
    stop_grace_period: 30s
    restart: unless-stopped

volumes:
  kis-data:
    external: true                 # 데몬 간 공유 — `docker volume create kis-data` 로 최초 1회 생성
