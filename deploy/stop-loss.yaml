name: kis-stop-loss

# 자동 손절 데몬 (전용 이미지 kisd-stop-loss).
# ⚠ command 끝에 "--execute" 를 붙이면 실주문. 기본은 dry-run(관찰만) — 검증 후 붙일 것.
# 상태(symbols.db·토큰캐시·*.toml)는 external 볼륨 kis-data 공유 — 준비 절차는 telegram.yaml 헤더 참조.
#
#   기동(dry-run): docker compose -f stop-loss.yaml up -d
#
# env: 공통(KIS_APP_KEY/SECRET/ACCOUNT_NUMBER), KIS_IS_MOCK(false=실주문)

services:
  stop-loss:
    image: ${KIS_IMAGE:-ghcr.io/preinpost/kisd-stop-loss:latest}
    pull_policy: always
    # 데몬 바이너리라 subcommand 없이 플래그만. 실매도하려면 끝에 "--execute" 추가.
    command: ["--threshold", "-5"]
    env_file: [.env]              # KIS_* 자격증명 — .env.example 참조
    environment:
      TZ: Asia/Seoul              # 한국 장시간 기준
      RUST_LOG: ${RUST_LOG:-info}
    volumes:
      - kis-data:/data            # 토큰캐시·symbols.db·*.toml 영속 (세 데몬 공유)
    init: true                    # tini → SIGTERM 전달 (그레이스풀 종료)
    stop_grace_period: 30s
    restart: unless-stopped

volumes:
  kis-data:
    external: true                # 데몬 간 공유 — `docker volume create kis-data` 로 최초 1회 생성
