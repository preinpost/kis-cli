name: kis-cli

# 다른 서버 배포용 — GHCR 에 발행된 이미지를 pull 해서 띄운다 (소스/빌드 불필요).
#
#   1) (private 패키지면) GHCR 로그인:
#        echo $GHCR_PAT | docker login ghcr.io -u <github-username> --password-stdin
#   2) cp .env.example .env  후 값 채우기
#   3) docker compose pull
#   4) 최초 1회 종목 마스터 동기화:
#        docker compose run --rm telegram symbols sync
#   5) 데몬별 기동(각 service 주석 참조)
#
# 모든 service 가 같은 이미지·볼륨·.env 를 공유한다.
x-kis: &kis
  # :latest = 최신 main 빌드 (CI 가 main 푸시마다 :latest 갱신). 롤링 :main 과 동일 본.
  # 특정 버전 고정: KIS_IMAGE=ghcr.io/preinpost/kis-cli:1.0.24  (또는 :sha-xxxxxxx)
  image: ${KIS_IMAGE:-ghcr.io/preinpost/kis-cli:latest}
  pull_policy: always
  env_file: [.env]              # KIS_* 자격증명 — .env.example 참조
  environment:
    TZ: Asia/Seoul              # 한국 장시간 기준
    RUST_LOG: ${RUST_LOG:-info}
  volumes:
    - kis-data:/data            # 토큰캐시·symbols.db·daytrade.db·*.toml 영속
  init: true                    # tini → SIGTERM 전달 (그레이스풀 종료)
  stop_grace_period: 30s
  restart: unless-stopped

services:
  # ── 텔레그램 실시간 관심종목 스트림 ───────────────────────────
  # env: KIS_APP_KEY/SECRET/ACCOUNT_NUMBER/IS_MOCK + KIS_TELEGRAM_BOT_TOKEN/CHAT_ID
  # 최초 관심종목 시드: docker compose run --rm telegram telegram stream 005930 000660 TSLA
  # 상주:              docker compose up -d telegram
  telegram:
    <<: *kis
    command: ["telegram", "stream"]

  # ── 데이트레이드 자동매매 데몬 ────────────────────────────────
  # env: KIS_APP_KEY/SECRET/ACCOUNT_NUMBER, KIS_IS_MOCK(false=실주문)
  # 전략 등록: docker compose run --rm daytrade daytrade add paper ma-cross 005930 --qty 1 --budget 1000000
  # 상주:     docker compose up -d daytrade      # daytrade.toml 변경 hot-reload
  daytrade:
    <<: *kis
    command: ["daytrade", "daemon"]

  # ── 자동 손절 데몬 ────────────────────────────────────────────
  # ⚠ command 끝에 "--execute" 붙이면 실주문. 기본은 dry-run(관찰만).
  # env: KIS_APP_KEY/SECRET/ACCOUNT_NUMBER, KIS_IS_MOCK(false=실주문)
  # 활성화(profile 로 기본 비활성): docker compose --profile stop-loss up -d stop-loss
  stop-loss:
    <<: *kis
    command: ["stop-loss", "run", "--threshold", "-5"]   # 실매도하려면 "--execute" 추가
    profiles: ["stop-loss"]

volumes:
  kis-data:
