name: kis-brief

# 로컬 빌드 + 시황 브리프 스트림 데몬 (전용 바이너리 kisd-brief).
# 소스에서 데몬 바이너리만 빌드한다. GHCR 발행 이미지로 띄우려면 deploy/ 참조.
# 데이트레이드 / 자동손절은 각각 daytrade.yaml / stop-loss.yaml 참조.
# 상태(symbols.db·토큰캐시·*.toml)는 external 볼륨 kis-data 로 세 데몬이 공유한다.
# 마이그레이션(이전 telegram.yaml): watchlist 파일명이 brief-stream.toml 로 변경 — 기존 telegram-stream.toml 은 볼륨에서 mv 하거나 `kis brief stream <종목> --once` 로 재시드.
#
#   준비 (최초 1회): 데몬 이미지엔 CLI 가 없으므로 sync/시드는 kis-cli 이미지로.
#     docker volume create kis-data                                   # 공유 볼륨 생성
#     docker build --build-arg PKG=kis-cli --build-arg BIN=kis -t kis-cli:local .   # CLI 이미지 1회 빌드
#     docker run --rm -v kis-data:/data --env-file .env -e TZ=Asia/Seoul \
#       kis-cli:local symbols sync                                    # 종목 마스터 동기화
#     docker compose -f brief.yaml build                              # 데몬 이미지 빌드
#   기동:
#     docker compose -f brief.yaml up -d
#
# 관심종목 1회 시드 (kis-cli:local 이미지로):
#   docker run --rm -v kis-data:/data --env-file .env -e TZ=Asia/Seoul \
#     kis-cli:local brief stream 005930 000660 TSLA --once

services:
  brief:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PKG: kisd-brief
        BIN: kisd-brief
    image: kisd-brief:local
    # command 불필요 — 데몬 바이너리 기본 동작.
    env_file:                      # 둘 다 선택 — 있는 파일에서 로드, .env.local 이 .env 를 덮어씀
      - path: .env                 #   (KIS_APP_KEY/SECRET, 계좌, 텔레그램 토큰 등 — .env.example 참고)
        required: false
      - path: .env.local
        required: false
    environment:
      TZ: Asia/Seoul               # 한국 장시간 기준
      RUST_LOG: ${RUST_LOG:-info}
    volumes:
      - kis-data:/data             # 토큰캐시·symbols.db·*.toml 영속 (세 데몬 공유)
    init: true                     # tini → SIGTERM 전달 (그레이스풀 종료)
    stop_grace_period: 30s
    restart: unless-stopped

volumes:
  kis-data:
    external: true                 # 데몬 간 공유 — `docker volume create kis-data` 로 최초 1회 생성
