name: Build & publish release (reusable)

on:
  workflow_call:
    inputs:
      tag:
        description: "빌드할 태그 (예: v0.1.2)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
          - target: x86_64-apple-darwin
            runner: macos-13
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Install Linux deps (wry)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: cargo build --release
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package tarball
        shell: bash
        env:
          VERSION: ${{ inputs.tag }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          STAGING="kis-${VERSION}-${TARGET}"
          mkdir -p "dist/${STAGING}"
          cp "target/${TARGET}/release/kis" "dist/${STAGING}/kis"
          cp README.md "dist/${STAGING}/" 2>/dev/null || true
          cp skill/SKILL.md "dist/${STAGING}/SKILL.md"
          tar czf "dist/${STAGING}.tar.gz" -C dist "${STAGING}"
          rm -rf "dist/${STAGING}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: dist/*.tar.gz
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate SHA256SUMS
        working-directory: dist
        run: sha256sum *.tar.gz > SHA256SUMS

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS
          generate_release_notes: true
          fail_on_unmatched_files: true
