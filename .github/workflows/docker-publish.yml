name: Publish container image (GHCR)

# 컨테이너 이미지를 GitHub Container Registry(ghcr.io)에 발행한다.
# - main 브랜치 푸시      → :main, :sha-<short>, :latest   (최신 본 — 평소 배포는 이걸 받음)
# - 버전 태그 푸시(v*)  → ghcr.io/<owner>/kis-cli:<X.Y.Z>, :<X.Y>, :latest
# - 수동 실행(dispatch)   → 현재 ref 기준 재빌드
#
# ⚠ bump.yml 이 만든 v* 태그/릴리즈 커밋 push 는 GITHUB_TOKEN 으로 이뤄져 이 워크플로를
#   트리거하지 못한다(GHA 재귀 방지). 따라서 실제 발행은 사람이 push 하는 main 이 주 경로이며,
#   :latest 도 main 빌드에 붙여 항상 존재하도록 한다.
#
# 다른 서버 배포: `docker compose pull` 로 이 이미지를 받아 띄운다(README "다른 서버 배포" 참조).
# 멀티아키(amd64+arm64) — arm64 는 QEMU 에뮬이라 첫 빌드가 느리지만 GHA 캐시로 이후 가속.

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # 예: preinpost/kis-cli

# 같은 ref 의 중복 빌드는 취소 (멀티아키 빌드가 길어서 비용 절약)
concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write          # GHCR push
    steps:
      - uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags/labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}
          # latest=auto(기본)는 버전 태그(v*)에 :latest 부여, 위 raw 규칙은 main 빌드에 :latest 부여.
          # → bump 가 만든 v* 태그는 CI 가 발화 안 하므로(GITHUB_TOKEN), main 경로로 :latest 보장.

      # QEMU 는 arm64 "런타임 스테이지"(apt/useradd, 가벼움) 실행에만 쓰임.
      # 무거운 Rust 컴파일은 Dockerfile 이 cargo-zigbuild 로 BUILDPLATFORM(amd64)에서
      # 네이티브 크로스컴파일하므로 에뮬레이션을 타지 않는다.
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false       # 멀티아키 매니페스트를 깔끔하게(불필요한 unknown/unknown 제외)
