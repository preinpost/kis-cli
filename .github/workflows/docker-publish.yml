name: Publish container images (GHCR)

# 워크스페이스 바이너리별 컨테이너 이미지를 GHCR 에 발행한다 (데몬별 독립 패키지).
#   ghcr.io/<owner>/kis-cli         — 인터랙티브/일회성 CLI (symbols sync·auth·daytrade add 등)
#   ghcr.io/<owner>/kisd-telegram   — 텔레그램 스트림 데몬
#   ghcr.io/<owner>/kisd-stop-loss  — 자동 손절 데몬
#   ghcr.io/<owner>/kisd-daytrade   — 데이트레이드 데몬
#
# - main 푸시  → 변경된 이미지만 재빌드 (path-filter). 공유 크레이트(kis-core/data/analysis/
#                daemon/trade)·Cargo.lock·Dockerfile 변경 시 4개 전부. :main/:sha-<short>/:latest
# - 태그(v*)   → 4개 전부 :X.Y.Z / :X.Y / :latest
# - 수동 dispatch → 4개 전부 (신규 패키지 부트스트랩용)
#
# ⚠ bump.yml 의 v* 태그는 GITHUB_TOKEN 푸시라 이 워크플로를 트리거하지 않는다(GHA 재귀 방지).
#   따라서 실제 발행 주 경로는 사람이 push 하는 main 이며, :latest 도 main 빌드에 붙는다.

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

# 같은 ref 의 중복 빌드는 취소 (멀티아치 빌드가 길어서 비용 절약)
concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 어떤 이미지를 빌드할지 결정 (경로 필터 → 동적 matrix) ──
  changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
      any: ${{ steps.set.outputs.any }}
    steps:
      - uses: actions/checkout@v5

      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          filters: |
            shared:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'crates/kis-core/**'
              - 'crates/kis-data/**'
              - 'crates/kis-analysis/**'
              - 'crates/kis-daemon/**'
              - 'crates/kis-trade/**'
              - 'Dockerfile'
              - '.dockerignore'
              - '.github/workflows/docker-publish.yml'
            cli:
              - 'crates/kis-cli/**'
              - 'skill/**'
            telegram:
              - 'crates/kisd-telegram/**'
            stoploss:
              - 'crates/kisd-stop-loss/**'
            daytrade:
              - 'crates/kisd-daytrade/**'

      - id: set
        env:
          # 태그 push(v*)·수동 dispatch → 전부 빌드 (paths-filter 는 main push 에서만 동작)
          FORCE_ALL: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/') }}
          SHARED: ${{ steps.filter.outputs.shared }}
          CLI: ${{ steps.filter.outputs.cli }}
          TG: ${{ steps.filter.outputs.telegram }}
          SL: ${{ steps.filter.outputs.stoploss }}
          DT: ${{ steps.filter.outputs.daytrade }}
        run: |
          set -euo pipefail
          # image == GHCR 패키지명 == cargo 패키지(-p) == 산출 바이너리(BIN)
          imgs=(kis-cli kisd-telegram kisd-stop-loss kisd-daytrade)
          want=()
          if [ "$FORCE_ALL" = "true" ] || [ "$SHARED" = "true" ]; then
            want=("${imgs[@]}")
          else
            [ "$CLI" = "true" ] && want+=(kis-cli)
            [ "$TG"  = "true" ] && want+=(kisd-telegram)
            [ "$SL"  = "true" ] && want+=(kisd-stop-loss)
            [ "$DT"  = "true" ] && want+=(kisd-daytrade)
          fi
          items=()
          for img in "${want[@]:-}"; do
            [ -n "$img" ] || continue
            items+=("{\"image\":\"$img\",\"pkg\":\"$img\",\"bin\":\"$img\"}")
          done
          if [ "${#items[@]}" -eq 0 ]; then
            echo 'any=false' >> "$GITHUB_OUTPUT"
            echo 'matrix={"include":[]}' >> "$GITHUB_OUTPUT"
          else
            echo 'any=true' >> "$GITHUB_OUTPUT"
            printf 'matrix={"include":[%s]}\n' "$(IFS=,; echo "${items[*]}")" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: changes
    if: needs.changes.outputs.any == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write          # GHCR push
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.changes.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags/labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      # QEMU 는 arm64 런타임 스테이지(apt/useradd) 실행에만 쓰임 — Rust 컴파일은
      # cargo-zigbuild 가 BUILDPLATFORM(amd64)에서 네이티브 크로스컴파일(에뮬레이션 없음).
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            PKG=${{ matrix.pkg }}
            BIN=${{ matrix.bin }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
          provenance: false       # 멀티아치 매니페스트 정리 (unknown/unknown 제외)
